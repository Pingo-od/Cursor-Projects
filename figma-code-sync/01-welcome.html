<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天禧 Claw — 欢迎</title>
  <link rel="stylesheet" href="01-welcome.css" />
</head>
<body>
  <div class="app-window">

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-bar-left">
        <div class="nav-actions">
          <button class="icon-btn nav-btn">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6L7.5 10" stroke="rgba(255,255,255,0.8)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn nav-btn disabled">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2L8.5 6L4.5 10" stroke="rgba(255,255,255,0.32)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="tabs">
          <div class="tab">
            <svg class="tab-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 5.5L7 1.5L12.5 5.5V12.5H9V9H5V12.5H1.5V5.5Z" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linejoin="round"/></svg>
            <span>主页</span>
            <div class="tab-sep"></div>
          </div>
          <div class="tab">
            <svg class="tab-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/><path d="M7 4.5V7.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="9.5" r="0.6" fill="rgba(255,255,255,0.8)"/></svg>
            <span>设置</span>
            <div class="tab-sep light"></div>
          </div>
          <div class="tab tab-active">
            <svg class="tab-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="11" height="11" rx="3" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/><path d="M4.5 7H9.5M7 4.5V9.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/></svg>
            <span>天禧 Claw</span>
          </div>
        </div>
      </div>
      <div class="window-controls">
        <div class="account-pill">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="3" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/><path d="M2 13c0-2.5 2.7-4 6-4s6 1.5 6 4" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/></svg>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 4L5 6.5L7.5 4" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <button class="icon-btn" title="置顶">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1V9M4 4L7 1L10 4M3 13H11" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" title="最小化">
          <svg width="14" height="1.4" viewBox="0 0 14 1.4"><line x1="0" y1="0.7" x2="14" y2="0.7" stroke="rgba(255,255,255,0.8)" stroke-width="1.4"/></svg>
        </button>
        <button class="icon-btn" title="窗口化">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="0.6" y="0.6" width="11.8" height="11.8" rx="2" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/></svg>
        </button>
        <button class="icon-btn close-btn" title="关闭">
          <svg width="10.4" height="10.4" viewBox="0 0 10.4 10.4" fill="none"><path d="M1 1L9.4 9.4M9.4 1L1 9.4" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="tab-bar-divider"></div>
    </div>

    <!-- Body -->
    <div class="body">
      <!-- Logo Row -->
      <div class="logo-row">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#3b83f7"/>
            <path d="M14 28C14 22 18 16 24 16C30 16 34 20 34 26C34 30 31 33 27 33C24 33 22 31 22 29C22 27 23.5 26 25 26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="30" cy="20" r="2.5" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">天禧 Claw</span>
      </div>

      <!-- Subtitle -->
      <p class="subtitle">你的 AI 虾塘，随时待命</p>

      <!-- Description -->
      <p class="description">天禧 Claw 是专为 AI 工作流设计的多虾协作平台，支持定时任务、产物管理与智能调度。无论是个人效率还是团队协作，都能轻松驾驭。</p>

      <!-- Feature Highlights -->
      <div class="features">
        <div class="feature-card">
          <div class="feature-icon-bg" style="background:#3b82f6;">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="7" cy="10" r="3" stroke="white" stroke-width="1.5"/><circle cx="13" cy="10" r="3" stroke="white" stroke-width="1.5"/><path d="M10 7V13" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="feature-title">多虾协作</div>
          <div class="feature-desc">多个 AI 虾同时运行，并行处理复杂任务，效率倍增。</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon-bg" style="background:#3b83f7;">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="white" stroke-width="1.5"/><path d="M10 6V10L13 12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="feature-title">定时执行</div>
          <div class="feature-desc">灵活配置定时任务，让 AI 在你休息时也能持续工作。</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon-bg" style="background:#8b5cf6;">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="white" stroke-width="1.5"/><path d="M7 8H13M7 11H11" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="feature-title">产物管理</div>
          <div class="feature-desc">统一管理所有 AI 输出产物，随时查阅、导出与复用。</div>
        </div>
      </div>

      <!-- CTA Buttons -->
      <div class="cta-row">
        <a class="cta-btn" href="03-onboarding-select.html">开始体验</a>
        <a class="cta-skip" href="10-claw.html">跳过</a>
      </div>
    </div>

  </div>
</body>
</html>
