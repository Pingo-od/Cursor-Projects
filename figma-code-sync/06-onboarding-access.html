<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问范围 - 天禧 Claw</title>
  <link rel="stylesheet" href="06-onboarding-access.css">
</head>
<body>
  <div class="app-window">
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-bar-left">
        <div class="nav-actions">
          <button class="icon-btn disabled">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 12L6 8L10 4" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-btn disabled">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 12L10 8L6 4" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="tabs">
          <div class="tab tab-active">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1L9 5L13 5.5L10 8.5L10.5 13L7 11L3.5 13L4 8.5L1 5.5L5 5L7 1Z" fill="rgba(255,255,255,0.6)"/>
            </svg>
            <span>开箱引导</span>
          </div>
        </div>
      </div>
      <div class="window-controls">
        <div class="account-pill">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="5" r="2.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
            <path d="M2 12C2 9.5 4 8 7 8C10 8 12 9.5 12 12" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>未登录</span>
        </div>
        <button class="icon-btn">
          <svg width="12" height="2" viewBox="0 0 12 2" fill="none">
            <rect width="12" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>
          </svg>
        </button>
        <button class="icon-btn close-btn">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 1L9 9M9 1L1 9" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="tab-bar-divider"></div>
    </div>

    <!-- Body -->
    <div class="body">
      <!-- Step Indicator -->
      <div class="step-indicator">
        <div class="step-dot gray"></div>
        <div class="step-line gray"></div>
        <div class="step-dot gray"></div>
        <div class="step-line gray"></div>
        <div class="step-dot gray"></div>
        <div class="step-line blue"></div>
        <div class="step-dot blue active"></div>
        <div class="step-line gray"></div>
        <div class="step-dot gray"></div>
        <span class="step-label">Step 4 / 5</span>
      </div>

      <!-- Title -->
      <div class="title-area">
        <h1 class="title">告诉 Claw 它可以去哪里</h1>
        <p class="subtitle">设置 Claw 允许和不允许访问的文件夹</p>
        <p class="subtitle">没有添加的地方，Claw 访问前会先问你</p>
      </div>

      <!-- Folder Lists -->
      <div class="folder-section">
        <!-- Allow List -->
        <div class="folder-col">
          <div class="folder-col-header">
            <div class="col-title allow">
              <span class="dot green"></span>
              允许访问的文件夹
            </div>
            <button class="add-btn">+ 添加</button>
          </div>
          <div class="folder-list" id="allowList">
            <div class="folder-item">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 4.5H12.5V11.5H1.5V4.5Z" stroke="#22c55e" stroke-width="1.2" stroke-linejoin="round"/><path d="M1.5 4.5L4 2.5H10L12.5 4.5" stroke="#22c55e" stroke-width="1.2" stroke-linejoin="round"/></svg>
              <span>D:\工作文件夹</span>
              <button class="remove-btn">×</button>
            </div>
            <div class="folder-item">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 4.5H12.5V11.5H1.5V4.5Z" stroke="#22c55e" stroke-width="1.2" stroke-linejoin="round"/><path d="M1.5 4.5L4 2.5H10L12.5 4.5" stroke="#22c55e" stroke-width="1.2" stroke-linejoin="round"/></svg>
              <span>C:\Users\用户名\Desktop</span>
              <button class="remove-btn">×</button>
            </div>
            <div class="folder-item">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 4.5H12.5V11.5H1.5V4.5Z" stroke="#22c55e" stroke-width="1.2" stroke-linejoin="round"/><path d="M1.5 4.5L4 2.5H10L12.5 4.5" stroke="#22c55e" stroke-width="1.2" stroke-linejoin="round"/></svg>
              <span>D:\项目资料</span>
              <button class="remove-btn">×</button>
            </div>
          </div>
        </div>

        <!-- Block List -->
        <div class="folder-col">
          <div class="folder-col-header">
            <div class="col-title block">
              <span class="dot red"></span>
              禁止访问的文件夹
            </div>
            <button class="add-btn danger">+ 添加</button>
          </div>
          <div class="folder-list" id="blockList">
            <div class="folder-item danger">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 4.5H12.5V11.5H1.5V4.5Z" stroke="#ef4444" stroke-width="1.2" stroke-linejoin="round"/><path d="M1.5 4.5L4 2.5H10L12.5 4.5" stroke="#ef4444" stroke-width="1.2" stroke-linejoin="round"/></svg>
              <span>C:\私人文件</span>
              <button class="remove-btn">×</button>
            </div>
            <div class="folder-empty-hint">可继续添加需要保护的文件夹</div>
          </div>
        </div>
      </div>

      <!-- Unknown Folders Row -->
      <div class="unknown-row">
        <div class="unknown-label">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#999" stroke-width="1.2"/><path d="M7 4.5V7.5" stroke="#999" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="9.5" r="0.6" fill="#999"/></svg>
          未在以上列表中的文件夹
        </div>
        <div class="unknown-select">
          <select>
            <option>访问前询问我</option>
            <option>始终允许</option>
            <option>始终拒绝</option>
          </select>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="#666" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Warning Note -->
      <div class="warning-note">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L14.5 13H1.5L8 2Z" stroke="#d97706" stroke-width="1.3" stroke-linejoin="round"/><path d="M8 6V9" stroke="#d97706" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="11" r="0.7" fill="#d97706"/></svg>
        <span>可以跳过，之后在<strong>设置 → 访问范围</strong>里随时修改。Claw 访问陌生文件夹时会先问你，你可以在那时决定是否加入列表。</span>
      </div>

      <!-- Bottom Buttons -->
      <div class="bottom-buttons">
        <a href="10-claw.html" class="btn-skip">跳过此步骤</a>
        <div class="btn-group">
          <a href="05-onboarding-permission.html" class="btn-prev">← 上一步</a>
          <a href="07-onboarding-quickstart.html" class="btn-next">下一步：完成设置 →</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
