                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.5928 6.60643C11.9828 6.21537 12.6158 6.21449 13.0068 6.60448L17.707 11.292C17.8952 11.4796 18.001 11.7343 18.001 12C18.001 12.2657 17.8952 12.5204 17.707 12.708L13.0068 17.3955C12.6158 17.7855 11.9828 17.7846 11.5928 17.3935C11.2028 17.0025 11.2037 16.3695 11.5947 15.9795L14.582 13H7C6.44772 13 6 12.5523 6 12C6 11.4477 6.44772 11 7 11H14.582L11.5947 8.02049C11.2037 7.63051 11.2028 6.99749 11.5928 6.60643Z" fill="white"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Effect A: 全屏欢迎动画 -->
  <div id="effect-a" class="effect-overlay effect-hidden">
    <div class="effect-a-content">
      <div class="effect-a-logo">
        <img src="https://www.figma.com/api/mcp/asset/a0d9aa18-149a-4aa4-9d6d-c3a3ce128c8a" alt="天禧 Claw" />
      </div>
      <div class="effect-a-title">欢迎使用天禧 Claw</div>
      <div class="effect-a-subtitle">你的 AI 专属队友已就位</div>
      <div class="effect-a-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var effect = params.get('effect');

      if (effect === 'a') {
        var overlay = document.getElementById('effect-a');
        var appWindow = document.querySelector('.app-window');
        // 显示 overlay，隐藏主界面
        overlay.classList.remove('effect-hidden');
        appWindow.style.opacity = '0';
        // 2秒后淡出 overlay，淡入主界面
        setTimeout(function() {
          overlay.classList.add('fade-out');
          appWindow.style.transition = 'opacity 0.8s ease';
          appWindow.style.opacity = '1';
          setTimeout(function() { overlay.remove(); }, 900);
        }, 2200);

      } else if (effect === 'b') {
        var targets = [
          '.tab-bar',
          '.sidebar',
          '.top-tip',
          '.hero',
          '.quick-cards',
          '.input-area'
        ];
        targets.forEach(function(sel, i) {
          var el = document.querySelector(sel);
          if (!el) return;
          el.style.opacity = '0';
          el.style.transform = 'translateY(24px)';
          setTimeout(function() {
            el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
          }, 150 + i * 150);
        });
      }
    });
  </script>
</body>
</html>
